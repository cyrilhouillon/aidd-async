name: Claude Async

# Wires the aidd-async pipeline into this repository.
# A mention on an issue or pull request routes to one self-contained skill.
# Each job loads only the plugins its skill transitively delegates to.
# Generated by aidd-async:00-async-setup; re-run that skill to regenerate.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-async-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # Brainstorm — "__BRAINSTORM_TAG__" on an issue (never a pull request).
  # Self-contained: delegates to nothing, so it loads only aidd-async.
  brainstorm:
    if: >-
      github.event.sender.type != 'Bot' &&
      github.event.issue.pull_request == null &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '__BRAINSTORM_TAG__')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '__BRAINSTORM_TAG__'))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          __CLAUDE_AUTH_LINE__
          prompt: >-
            Use skill aidd-async:01-async-brainstorm on issue
            #${{ github.event.issue.number }} in ${{ github.repository }}.
            Run exactly one round, post the comment, then stop.
          plugins: |
            aidd-async@aidd-async
          plugin_marketplaces: |
            __ASYNC_MARKETPLACE__
          claude_args: --max-turns 25 --allowedTools "Read,Grep,Glob,Write,Bash(gh:*)"

  # Implement — "__IMPLEMENT_TAG__" on an issue (never a pull request).
  # Delegates to aidd-dev:00-sdlc, which discovers the spec capability
  # (aidd-pm), the commit and change-request capabilities (aidd-vcs), and
  # runs the aidd-dev steps. Branch ownership is the workflow's: it prepares a
  # feature branch from the default branch, and the delegated flow keeps it.
  implement:
    if: >-
      github.event.sender.type != 'Bot' &&
      github.event.issue.pull_request == null &&
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '__IMPLEMENT_TAG__')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: __DEFAULT_BRANCH__
          fetch-depth: 0
      - name: Prepare the feature branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="aidd/issue-${{ github.event.issue.number }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git switch "$BRANCH"
          else
            git switch -c "$BRANCH"
          fi
      - uses: anthropics/claude-code-action@v1
        with:
          __CLAUDE_AUTH_LINE__
          prompt: >-
            Use skill aidd-async:02-async-implement on issue
            #${{ github.event.issue.number }} in ${{ github.repository }}.
            You are on the prepared feature branch. Delegate the full flow, then
            comment the draft pull request back on the issue.
          plugins: |
            aidd-async@aidd-async
            aidd-dev@aidd-framework
            aidd-vcs@aidd-framework
            aidd-pm@aidd-framework
          plugin_marketplaces: |
            __ASYNC_MARKETPLACE__
            __FRAMEWORK_MARKETPLACE__
          claude_args: --max-turns 40 --allowedTools "Read,Grep,Glob,Edit,Write,TodoWrite,Bash(git:*),Bash(gh:*),__STACK_TOOLS__"

  # Fix — "__IMPLEMENT_TAG__" on a pull request. Applies the review feedback.
  # Delegates to aidd-dev:02-implement, aidd-dev:05-review, and
  # aidd-vcs:01-commit. No spec step, so no aidd-pm.
  fix:
    if: >-
      github.event.sender.type != 'Bot' &&
      github.event.issue.pull_request != null &&
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '__IMPLEMENT_TAG__')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check out the pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH=$(gh pr view "${{ github.event.issue.number }}" --json headRefName --jq .headRefName)
          git switch "$BRANCH"
      - uses: anthropics/claude-code-action@v1
        with:
          __CLAUDE_AUTH_LINE__
          prompt: >-
            Use skill aidd-async:03-async-fix on pull request
            #${{ github.event.issue.number }} in ${{ github.repository }}.
            You are on the pull request branch. Apply the review feedback newer
            than your last activity and push onto it.
          plugins: |
            aidd-async@aidd-async
            aidd-dev@aidd-framework
            aidd-vcs@aidd-framework
          plugin_marketplaces: |
            __ASYNC_MARKETPLACE__
            __FRAMEWORK_MARKETPLACE__
          claude_args: --max-turns 25 --allowedTools "Read,Grep,Glob,Edit,Write,TodoWrite,Bash(git:*),Bash(gh:*),__STACK_TOOLS__"
